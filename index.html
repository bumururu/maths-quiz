<title>Maths Quiz</title>

'%23d3b465' stroke-width='5'/%3E%3Ccircle cx='91.7' cy='118.3' r='5' fill='%23fff' opacity='0.5'/%3E%3Cpath d='M84.4 145.4q-7.4 27 7.4 41.8q17.2 14.7 36.9 9.8' fill='none' stroke='%23d3b465' stroke-width='3' stroke-linecap='round'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chango&family=Nunito:wght@800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    background: #89cff0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  #appWrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }
  .page-header { margin-bottom: 28px; }
  .card {
    background: #fff;
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    width: 100%;
    max-width: 480px;
    padding: 36px 32px;
    text-align: center;
  }
  .hidden { display: none !important; }

  /* ---------- Start screen ---------- */
  .logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 16px;
  }
  .logo-badge {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: #d0ecff;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .logo-badge svg { width: 96px; height: 108px; }
  .logo-word {
    font-family: 'Chango', 'Bree Serif', serif;
    font-size: 52px;
    line-height: 0.86;
    letter-spacing: -0.52px;
    text-align: left;
  }
  .logo-word .maths { color: #36884d; }
  .logo-word .quiz { color: #36884d; }
  .ops {
    display: flex;
    justify-content: center;
    gap: 10px;
  }
  .ops span {
    width: 34px;
    height: 34px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', system-ui, sans-serif;
    font-weight: 800;
    font-size: 20px;
    color: #fff;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transition: opacity 0.15s, transform 0.15s, filter 0.15s;
  }
  .ops .op-add { background: #0075d4; }
  .ops .op-sub { background: #07468b; }
  .ops .op-mul { background: #36884d; }
  .ops .op-div { background: #1b2435; }
  .ops span.off { opacity: 0.32; filter: saturate(0.35); transform: scale(0.9); }
  .ops-hint {
    font-family: 'Nunito', system-ui, sans-serif;
    font-weight: 800;
    font-size: 13px;
    color: #36884d;
    text-align: center;
    margin-top: 8px;
  }
  .levels {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 0 0 18px;
  }
  .level-btn {
    font-family: 'Chango', 'Bree Serif', serif;
    font-size: 18px;
    padding: 10px 20px;
    border-radius: 999px;
    border: 3px solid #d7e3f0;
    background: #fff;
    color: #36884d;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.1s;
  }
  .level-btn:hover { border-color: #89cff0; }
  .level-btn:active { transform: scale(0.96); }
  .level-btn.selected {
    background: #36884d;
    color: #fff;
    border-color: #36884d;
  }
  .start-btn {
    display: inline-flex;
    align-items: center;
    gap: 16px;
    background: #36884d;
    color: #fff;
    font-family: 'Chango', 'Bree Serif', serif;
    font-size: 30px;
    font-weight: 400;
    letter-spacing: 0.3px;
    border: none;
    border-radius: 20px;
    padding: 18px 34px 20px;
    cursor: pointer;
    box-shadow: #15632f 0 8px 0 0, rgba(21,99,47,0.7) 0 18px 26px -12px;
    margin: 10px 0 14px;
    transition: transform 0.1s, box-shadow 0.1s, background 0.2s;
  }
  .start-btn:hover { background: #3d9456; }
  .start-btn:active {
    transform: translateY(6px);
    box-shadow: #15632f 0 2px 0 0, rgba(21,99,47,0.7) 0 8px 14px -10px;
  }
  .start-btn .icon {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .start-btn .icon svg { width: 38px; height: 43px; }

  /* ---------- Quiz screen ---------- */
  .stats {
    display: flex;
    justify-content: space-between;
    margin-bottom: 12px;
    gap: 10px;
  }
  .stat {
    flex: 1;
    background: #d9f2d9;
    border-radius: 14px;
    padding: 10px 8px;
  }
  .stat .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #36884d;
    font-weight: 600;
  }
  .stat .value {
    font-size: 24px;
    font-weight: 800;
    color: #36884d;
  }
  .stat.streak .value { color: #36884d; }
  .bests {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 28px;
  }
  .bests .stat { background: #d9f2d9; flex: 0 1 200px; }
  .best-streak .value { color: #36884d; }
  .question {
    font-size: 42px;
    font-weight: 800;
    color: #36884d;
    margin: 18px 0 28px;
    letter-spacing: 1px;
    min-height: 56px;
  }
  .answer-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 20px;
  }
  input[type="text"] {
    width: 160px;
    font-size: 30px;
    font-weight: 700;
    text-align: center;
    padding: 12px;
    border: 3px solid #d6daf0;
    border-radius: 14px;
    outline: none;
    color: #36884d;
  }
  input[type="text"]:focus { border-color: #89cff0; }
  .check-btn {
    font-size: 18px;
    font-weight: 700;
    padding: 12px 26px;
    border: none;
    border-radius: 14px;
    background: #89cff0;
    color: #fff;
    cursor: pointer;
    transition: transform 0.1s, background 0.2s;
  }
  .check-btn:hover { background: #6db8e0; }
  .check-btn:active { transform: scale(0.96); }
  .feedback {
    min-height: 32px;
    font-size: 20px;
    font-weight: 700;
  }
  .feedback.correct { color: #36884d; }
  .feedback.wrong { color: #36884d; }
  .attempts {
    margin-top: 10px;
    font-size: 14px;
    color: #36884d;
  }
  .shake { animation: shake 0.4s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-10px); }
    40% { transform: translateX(10px); }
    60% { transform: translateX(-7px); }
    80% { transform: translateX(7px); }
  }
  .pop { animation: pop 0.45s; }
  @keyframes pop {
    0% { transform: scale(1); }
    40% { transform: scale(1.18); }
    100% { transform: scale(1); }
  }
  .card.flash-green { animation: flashGreen 0.7s; }
  @keyframes flashGreen {
    0% { box-shadow: 0 0 0 0 rgba(22,163,74,0.7); }
    100% { box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  }

  /* ---------- Celebrations ---------- */
  #confettiCanvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 60;
  }
  #pandaParty {
    position: fixed;
    inset: 0;
    z-index: 70;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    background: rgba(255,255,255,0.65);
    pointer-events: none;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.25s;
  }
  #pandaParty.show { opacity: 1; visibility: visible; }
  #pandaParty .dancer { animation: pandaDance 0.7s ease-in-out infinite; }
  #pandaParty .dancer svg { width: 200px; height: 225px; display: block; }
  #pandaParty .party-text {
    font-family: 'Chango', 'Bree Serif', serif;
    font-size: 36px;
    color: #36884d;
    text-shadow: 0 2px 0 #fff;
  }
  #pandaParty .spark {
    position: absolute;
    font-size: 34px;
    animation: sparkFloat 1.1s ease-in-out infinite;
  }
  @keyframes pandaDance {
    0%   { transform: rotate(0deg) translateY(0) scale(1); }
    15%  { transform: rotate(-12deg) translateY(-20px) scale(1.05); }
    30%  { transform: rotate(10deg) translateY(0) scale(1); }
    45%  { transform: rotate(-10deg) translateY(-16px) scale(1.07); }
    60%  { transform: rotate(12deg) translateY(0) scale(1); }
    75%  { transform: rotate(-8deg) translateY(-12px) scale(1.04); }
    100% { transform: rotate(0deg) translateY(0) scale(1); }
  }
  @keyframes sparkFloat {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-26px) rotate(14deg); }
  }
  #pandaSad {
    position: fixed;
    inset: 0;
    z-index: 65;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    pointer-events: none;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.2s;
  }
  #pandaSad.show { opacity: 1; visibility: visible; }
  #pandaSad.show .sad-panda { animation: sadDroop 1.3s ease-in-out; }
  #pandaSad .sad-panda svg {
    width: 130px;
    height: 146px;
    display: block;
    filter: grayscale(0.65);
  }
  #pandaSad .sad-text {
    font-family: 'Chango', 'Bree Serif', serif;
    font-size: 26px;
    color: #36884d;
    text-shadow: 0 2px 0 #fff;
  }
  @keyframes sadDroop {
    0%   { transform: translateY(-16px) rotate(0deg) scale(0.9); }
    25%  { transform: translateY(4px) rotate(-7deg) scale(1); }
    50%  { transform: translateY(8px) rotate(6deg) scale(1); }
    75%  { transform: translateY(12px) rotate(-4deg) scale(0.98); }
    100% { transform: translateY(14px) rotate(0deg) scale(0.97); }
  }

  /* ---------- Montgomery: every 10 in a row ---------- */
  #montyParty {
    position: fixed;
    inset: 0;
    z-index: 80;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: rgba(233, 241, 252, 0.92);
    pointer-events: none;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.25s;
  }
  #montyParty.show { opacity: 1; visibility: visible; }
  .m-stage {
    position: relative;
    width: 320px;
    height: 330px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  .m-stage::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 56%;
    width: 250px;
    height: 250px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle, #d0ecff 0%, #eef5fc 55%, transparent 72%);
  }
  .m-confetti, .m-pops {
    position: absolute;
    inset: -10px 0 0 0;
    pointer-events: none;
  }
  .m-confetti { overflow: hidden; border-radius: 24px; }
  .m-panda { position: relative; z-index: 2; }
  .m-honour {
    font-family: 'Chango', 'Bree Serif', serif;
    font-size: 30px;
    color: #0075d4;
    letter-spacing: 0.4px;
    text-shadow: 0 2px 0 #fff;
  }
  .m-points {
    font-family: 'Chango', 'Bree Serif', serif;
    font-size: 20px;
    color: #fff;
    background: #36884d;
    padding: 8px 18px;
    border-radius: 999px;
    margin-top: 8px;
  }
  #montyParty.show .m-honour, #montyParty.show .m-points { animation: popin 0.55s cubic-bezier(.2,1.4,.4,1) both; }
  @keyframes popin {
    0% { transform: scale(0.55); opacity: 1; }
    55% { transform: scale(1.12); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* the dance rig */
  .pd-svg { overflow: visible; }
  .pd-dancer { transform-box: fill-box; transform-origin: center bottom; animation: pd-groove 0.92s ease-in-out infinite; }
  .pd-head { transform-box: fill-box; transform-origin: center bottom; animation: pd-headbob 0.92s ease-in-out infinite; }
  .pd-arm  { transform-box: fill-box; transform-origin: center top; }
  .pd-arm-l { animation: pd-armL 0.46s ease-in-out infinite; }
  .pd-arm-r { animation: pd-armR 0.46s ease-in-out infinite; }
  .pd-leg  { transform-box: fill-box; transform-origin: center top; }
  .pd-leg-l { animation: pd-legL 0.92s ease-in-out infinite; }
  .pd-leg-r { animation: pd-legR 0.92s ease-in-out infinite; }
  .pd-cane { transform-box: fill-box; transform-origin: center bottom; animation: pd-cane 0.92s ease-in-out infinite; }
  .pd-shadow { transform-box: fill-box; transform-origin: center center; animation: pd-shadow 0.92s ease-in-out infinite; }

  @keyframes pd-groove {
    0%   { transform: translateY(2px)  rotate(-3deg) scaleY(0.97); }
    25%  { transform: translateY(-18px) rotate(0deg)  scaleY(1.03); }
    50%  { transform: translateY(2px)  rotate(3deg)  scaleY(0.97); }
    75%  { transform: translateY(-18px) rotate(0deg)  scaleY(1.03); }
    100% { transform: translateY(2px)  rotate(-3deg) scaleY(0.97); }
  }
  @keyframes pd-headbob {
    0% { transform: rotate(5deg); } 50% { transform: rotate(-5deg); } 100% { transform: rotate(5deg); }
  }
  @keyframes pd-armL {
    0% { transform: rotate(122deg); } 50% { transform: rotate(150deg); } 100% { transform: rotate(122deg); }
  }
  @keyframes pd-armR {
    0% { transform: rotate(-122deg); } 50% { transform: rotate(-150deg); } 100% { transform: rotate(-122deg); }
  }
  @keyframes pd-legL {
    0%,100% { transform: rotate(0deg); } 25% { transform: rotate(12deg); } 50% { transform: rotate(0deg); }
  }
  @keyframes pd-legR {
    0%,100% { transform: rotate(0deg); } 75% { transform: rotate(-12deg); } 50% { transform: rotate(0deg); }
  }
  @keyframes pd-cane {
    0% { transform: rotate(-6deg); } 50% { transform: rotate(8deg); } 100% { transform: rotate(-6deg); }
  }
  @keyframes pd-shadow {
    0%,50%,100% { transform: scaleX(1); opacity: 0.16; }
    25%,75%     { transform: scaleX(0.7); opacity: 0.09; }
  }

  /* falling confetti pieces */
  .cfetti {
    position: absolute;
    top: -24px;
    width: 11px;
    height: 14px;
    border-radius: 2px;
    animation: cfall linear forwards;
  }
  @keyframes cfall {
    0%   { transform: translateY(0) translateX(0) rotate(0deg); opacity: 1; }
    85%  { opacity: 1; }
    100% { transform: translateY(330px) translateX(var(--dx)) rotate(var(--rot)); opacity: 0; }
  }

  /* maths-symbol pops */
  .m-pop {
    position: absolute;
    left: 50%;
    top: 46%;
    font-family: 'Chango', 'Bree Serif', serif;
    font-weight: 700;
    transform: translate(-50%,-50%) scale(0);
    animation: mpop 0.7s cubic-bezier(.2,1.3,.5,1) forwards;
  }
  @keyframes mpop {
    0%   { transform: translate(-50%,-50%) translate(0,0) scale(0); opacity: 0; }
    35%  { opacity: 1; }
    100% { transform: translate(-50%,-50%) translate(var(--px), var(--py)) scale(1); opacity: 0; }
  }

  @media (prefers-reduced-motion: reduce) {
    .pd-dancer,.pd-head,.pd-arm-l,.pd-arm-r,.pd-leg-l,.pd-leg-r,.pd-cane,.pd-shadow,.cfetti,.m-pop { animation: none; }
    .pd-arm-l { transform: rotate(135deg); } .pd-arm-r { transform: rotate(-135deg); }
  }

  /* ---------- Compact layout for phones ---------- */
  @media (max-width: 480px) {
    body { padding: 10px; }
    .page-header { margin-bottom: 14px; }
    .logo { gap: 12px; margin-bottom: 10px; }
    .logo-badge { width: 72px; height: 72px; }
    .logo-badge svg { width: 56px; height: 63px; }
    .logo-word { font-size: 32px; letter-spacing: -0.3px; }
    .ops { gap: 8px; }
    .ops span { width: 26px; height: 26px; border-radius: 7px; font-size: 15px; }
    .ops-hint { font-size: 11px; margin-top: 6px; }
    .levels { gap: 8px; margin-bottom: 12px; }
    .level-btn { font-size: 14px; padding: 8px 14px; }
    .card { padding: 18px 16px; border-radius: 18px; }
    .stats { margin-bottom: 8px; gap: 8px; }
    .stat { padding: 7px 6px; border-radius: 11px; }
    .stat .value { font-size: 19px; }
    .bests { margin-bottom: 14px; }
    .question { font-size: 30px; margin: 8px 0 14px; min-height: 40px; }
    .answer-row { margin-bottom: 12px; }
    input[type="text"] { width: 130px; font-size: 24px; padding: 8px; }
    .check-btn { font-size: 16px; padding: 10px 20px; }
    .feedback { min-height: 26px; font-size: 17px; }
    .attempts { margin-top: 6px; font-size: 13px; }
    .start-btn { font-size: 24px; padding: 14px 26px 16px; gap: 12px; }
    .start-btn .icon { width: 36px; height: 36px; }
    .start-btn .icon svg { width: 30px; height: 34px; }
  }
</style>
</head>
<body>
<div id="appWrap">
<!-- Logo header (on the blue background, above the card) -->
<div class="page-header">
  <div class="logo">
      <div class="logo-badge">
        <svg viewBox="0 -40 240 270" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cute panda wearing a top hat and monocle">
          <circle cx="56.36" cy="54.92" r="36.12" fill="#1b2435"/>
          <circle cx="183.64" cy="54.92" r="36.12" fill="#1b2435"/>
          <circle cx="120" cy="122" r="86" fill="#ffffff"/>
          <ellipse cx="83.88" cy="120.28" rx="25.8" ry="34.4" fill="#1b2435" transform="rotate(20 83.88 120.28)"/>
          <ellipse cx="156.12" cy="120.28" rx="25.8" ry="34.4" fill="#1b2435" transform="rotate(-20 156.12 120.28)"/>
          <circle cx="83.88" cy="125.44" r="11.61" fill="#fff"/>
          <circle cx="156.12" cy="125.44" r="11.61" fill="#fff"/>
          <circle cx="85.62" cy="127.18" r="7.2" fill="#1b2435"/>
          <circle cx="157.86" cy="127.18" r="7.2" fill="#1b2435"/>

<script>
(function () {
  var qnumEl = document.getElementById('qnum');
  var scoreEl = document.getElementById('score');
  var streakEl = document.getElementById('streak');
  var questionEl = document.getElementById('question');
  var answerEl = document.getElementById('answer');
  var checkBtn = document.getElementById('check');
  var feedbackEl = document.getElementById('feedback');
  var attemptsEl = document.getElementById('attempts');
  var card = document.getElementById('card');
  var bestStreakEl = document.getElementById('bestStreak');
  var startView = document.getElementById('startView');
  var quizView = document.getElementById('quizView');
  var startBtn = document.getElementById('startBtn');

  var qnum = 1, score = 0, streak = 0, attempts = 0;
  var current = null;
  var locked = false;

  // --- persistent best streak (saved in this browser) ---
  var BEST_STREAK_KEY = 'mathsQuizBestStreak';

  function loadBest(key) {
    try {
      var v = parseInt(localStorage.getItem(key), 10);
      return isNaN(v) ? 0 : v;
    } catch (e) { return 0; }   // private mode / storage blocked: just don't persist
  }
  function saveBest(key, val) {
    try { localStorage.setItem(key, String(val)); } catch (e) {}
  }

  var bestStreak = loadBest(BEST_STREAK_KEY);
  bestStreakEl.textContent = bestStreak;

  // --- difficulty levels + operator toggles ---
  var OPS_KEY = 'mathsQuizOps';
  var LEVEL_KEY = 'mathsQuizLevel';
  var LEVELS = {
    easy:   { addMax: 10, subMin: 5,  mulMax: 5,  divMax: 25,  singleProb: 1 },
    medium: { addMax: 49, subMin: 5,  mulMax: 12, divMax: 49,  singleProb: 0.45 },
    hard:   { addMax: 99, subMin: 12, mulMax: 12, divMax: 144, singleProb: 0.15 }
  };
  var OP_ORDER = ['+', '−', '×', '÷'];

  function loadJSON(key, fallback) {
    try {
      var v = JSON.parse(localStorage.getItem(key));
      return v === null || v === undefined ? fallback : v;
    } catch (e) { return fallback; }
  }
  function saveJSON(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
  }

  var enabledOps = loadJSON(OPS_KEY, null);
  if (!enabledOps || !OP_ORDER.some(function (o) { return enabledOps[o]; })) {
    enabledOps = { '+': true, '−': true, '×': true, '÷': true };
  }
  var level = loadJSON(LEVEL_KEY, 'medium');
  if (!LEVELS[level]) level = 'medium';

  function activeOps() {
    return OP_ORDER.filter(function (o) { return enabledOps[o]; });
  }

  var opChips = document.querySelectorAll('.ops span');
  function refreshChips() {
    Array.prototype.forEach.call(opChips, function (chip) {
      var on = !!enabledOps[chip.getAttribute('data-op')];
      chip.classList.toggle('off', !on);
      chip.setAttribute('aria-pressed', on ? 'true' : 'false');
    });
  }
  function toggleOp(chip) {
    var op = chip.getAttribute('data-op');
    if (enabledOps[op] && activeOps().length === 1) {
      chip.classList.remove('shake');
      void chip.offsetWidth;
      chip.classList.add('shake');   // last one standing: refuse with a wobble
      return;
    }
    enabledOps[op] = !enabledOps[op];
    saveJSON(OPS_KEY, enabledOps);
    refreshChips();
  }
  Array.prototype.forEach.call(opChips, function (chip) {
    chip.addEventListener('click', function () { toggleOp(chip); });
    chip.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleOp(chip); }
    });
  });
  refreshChips();

  var levelBtns = document.querySelectorAll('.level-btn');
  function refreshLevels() {
    Array.prototype.forEach.call(levelBtns, function (btn) {
      btn.classList.toggle('selected', btn.getAttribute('data-level') === level);
    });
  }
  Array.prototype.forEach.call(levelBtns, function (btn) {
    btn.addEventListener('click', function () {
      level = btn.getAttribute('data-level');
      saveJSON(LEVEL_KEY, level);
      refreshLevels();
    });
  });
  refreshLevels();

  // --- celebrations: confetti + dancing panda ---
  var confettiCanvas = document.getElementById('confettiCanvas');
  var ctx = confettiCanvas.getContext('2d');
  var particles = [];
  var confettiRunning = false;
  var CONFETTI_COLORS = ['#36884d', '#62bb78', '#0075d4', '#07468b', '#e3928b', '#f59e0b', '#ffffff'];

  function resizeCanvas() {
    confettiCanvas.width = window.innerWidth;
    confettiCanvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  function burst(n, x, y) {
    for (var i = 0; i < n; i++) {
      var ang = Math.random() * Math.PI * 2;
      var sp = 4 + Math.random() * 7;
      particles.push({
        x: x, y: y,
        vx: Math.cos(ang) * sp,
        vy: Math.sin(ang) * sp - 6,
        w: 6 + Math.random() * 6,
        h: 4 + Math.random() * 4,
        rot: Math.random() * Math.PI,
        vr: (Math.random() - 0.5) * 0.3,
        color: CONFETTI_COLORS[(Math.random() * CONFETTI_COLORS.length) | 0],
        life: 70 + ((Math.random() * 30) | 0)
      });
    }
    if (!confettiRunning) {
      confettiRunning = true;
      requestAnimationFrame(confettiTick);
    }
  }

  function confettiTick() {
    ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
    particles = particles.filter(function (p) {
      return p.life > 0 && p.y < confettiCanvas.height + 20;
    });
    if (!particles.length) { confettiRunning = false; return; }
    particles.forEach(function (p) {
      p.vy += 0.25;
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.99;
      p.rot += p.vr;
      p.life--;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.globalAlpha = Math.min(1, p.life / 30);
      ctx.fillStyle = p.color;
      if (p.drop) {
        ctx.beginPath();
        ctx.arc(0, 0, p.w / 2, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      }
      ctx.restore();
    });
    requestAnimationFrame(confettiTick);
  }

  function celebrate() {
    var r = card.getBoundingClientRect();
    burst(60, r.left + r.width / 2, r.top + r.height * 0.35);
  }

  var pandaParty = document.getElementById('pandaParty');
  document.getElementById('pandaDancer')
    .appendChild(document.querySelector('.logo-badge svg').cloneNode(true));

  function pandaDance() {
    pandaParty.classList.add('show');
    burst(150, window.innerWidth / 2, window.innerHeight * 0.3);
    setTimeout(function () { burst(100, window.innerWidth / 2, window.innerHeight * 0.4); }, 600);
    setTimeout(function () { pandaParty.classList.remove('show'); }, 2400);
  }

  // --- sad anti-celebration: grey rain + sad panda ---
  var RAIN_COLORS = ['#7fa8c9', '#9bb0c1', '#5b7c99', '#b8c6d4'];
  var pandaSad = document.getElementById('pandaSad');
  var sadTimer = null;

  var sadSvg = document.querySelector('.logo-badge svg').cloneNode(true);
  var SVG_NS = 'http://www.w3.org/2000/svg';
  [[85.6, 140], [157.9, 140]].forEach(function (pos) {
    var tear = document.createElementNS(SVG_NS, 'ellipse');
    tear.setAttribute('cx', pos[0]);
    tear.setAttribute('cy', pos[1]);
    tear.setAttribute('rx', 4.5);
    tear.setAttribute('ry', 8);
    tear.setAttribute('fill', '#4f8fd9');
    sadSvg.appendChild(tear);
  });
  // sad mouth: replace the smile path with a frown
  var mouth = sadSvg.querySelector('path');
  if (mouth) mouth.setAttribute('d', 'M120 182q-12.04-15.48-22.36-3.44M120 182q12.04-15.48 22.36-3.44');
  document.getElementById('sadPandaSlot').appendChild(sadSvg);

  function rain(n) {
    var r = card.getBoundingClientRect();
    for (var i = 0; i < n; i++) {
      particles.push({
        x: r.left + Math.random() * r.width,
        y: r.top - 10 - Math.random() * 40,
        vx: (Math.random() - 0.5) * 0.6,
        vy: 1.5 + Math.random() * 2.5,
        w: 5 + Math.random() * 4,
        h: 0,
        rot: 0,
        vr: 0,
        drop: true,
        color: RAIN_COLORS[(Math.random() * RAIN_COLORS.length) | 0],
        life: 60 + ((Math.random() * 30) | 0)
      });
    }
    if (!confettiRunning) {
      confettiRunning = true;
      requestAnimationFrame(confettiTick);
    }
  }

  function sadMoment() {
    rain(26);
    pandaSad.classList.remove('show');
    void pandaSad.offsetWidth;   // restart the droop animation
    pandaSad.classList.add('show');
    clearTimeout(sadTimer);
    sadTimer = setTimeout(function () { pandaSad.classList.remove('show'); }, 1300);
  }

  // --- Montgomery's dance: every 10 correct in a row ---
  var montyEl = document.getElementById('montyParty');
  var mConfetti = document.getElementById('mConfetti');
  var mPops = document.getElementById('mPops');
  var mPoints = document.getElementById('mPoints');
  var MONTY_COLORS = ['#0075d4', '#07468b', '#62bb78', '#1b2435', '#86c5fa'];
  var MONTY_SYMBOLS = ['+', '−', '×', '÷', '='];

  function montyConfetti() {
    mConfetti.innerHTML = '';
    for (var i = 0; i < 46; i++) {
      var s = document.createElement('span');
      s.className = 'cfetti';
      s.style.left = (Math.random() * 100) + '%';
      s.style.background = MONTY_COLORS[i % MONTY_COLORS.length];
      s.style.borderRadius = Math.random() > 0.6 ? '50%' : '2px';
      s.style.setProperty('--dx', (Math.random() * 80 - 40) + 'px');
      s.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');
      s.style.animationDuration = (1.1 + Math.random() * 1.1).toFixed(2) + 's';
      s.style.animationDelay = (Math.random() * 0.5).toFixed(2) + 's';
      mConfetti.appendChild(s);
    }
  }

  function montyPops() {
    mPops.innerHTML = '';
    for (var i = 0; i < 7; i++) {
      var a = (i / 7) * Math.PI * 2 + Math.random();
      var dist = 90 + Math.random() * 40;
      var s = document.createElement('span');
      s.className = 'm-pop';
      s.textContent = MONTY_SYMBOLS[i % MONTY_SYMBOLS.length];
      s.style.setProperty('--px', (Math.cos(a) * dist) + 'px');
      s.style.setProperty('--py', (Math.sin(a) * dist * 0.8) + 'px');
      s.style.fontSize = (20 + Math.random() * 16) + 'px';
      s.style.color = i % 2 ? '#0075d4' : '#36884d';
      s.style.animationDelay = (Math.random() * 0.15).toFixed(2) + 's';
      mPops.appendChild(s);
    }
  }

  function montyParty(streakNow) {
    mPoints.textContent = streakNow + ' in a row!';
    montyConfetti();
    montyPops();
    montyEl.classList.remove('show');
    void montyEl.offsetWidth;
    montyEl.classList.add('show');
    setTimeout(function () { montyConfetti(); montyPops(); }, 1500);
    setTimeout(function () { montyEl.classList.remove('show'); }, 3200);
  }

  function popEl(el) {
    el.classList.remove('pop');
    void el.offsetWidth;
    el.classList.add('pop');
  }

  var praise = ['Correct!', 'Nice one!', 'Spot on!', 'Brilliant!', 'You got it!', 'Well done!'];
  var nudge = ['Not quite — try again', 'Close, have another go', 'Try again', 'Check it once more'];

  function randInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }
  function pick(arr) { return arr[randInt(0, arr.length - 1)]; }

  // Generate first pair: returns [a, b, result] sized by the current level
  function genPair(op) {
    var L = LEVELS[level], a, b;
    if (op === '+') {
      a = randInt(2, L.addMax); b = randInt(2, L.addMax);
      return [a, b, a + b];
    }
    if (op === '−') {
      a = randInt(L.subMin, L.addMax); b = randInt(2, a - 1);
      return [a, b, a - b];
    }
    if (op === '×') {
      a = randInt(2, L.mulMax); b = randInt(2, L.mulMax);
      return [a, b, a * b];
    }
    // division: exact, dividend capped by level
    var d = randInt(2, L.mulMax);
    var q = randInt(2, Math.max(2, Math.floor(L.divMax / d)));
    return [q * d, d, q];
  }

  // Apply second operation to running result r with new number c
  function genSecond(r, op) {
    var L = LEVELS[level], c;
    if (op === '+') {
      c = randInt(2, L.addMax);
      return [c, r + c];
    }
    if (op === '−') {
      if (r < 4) return null;
      c = randInt(2, Math.min(L.addMax, r - 1));
      return [c, r - c];
    }
    if (op === '×') {
      if (r > 25) return null;          // keep it mental-maths sized
      c = randInt(2, r > 12 ? 6 : L.mulMax);
      if (r * c > 200) return null;
      return [c, r * c];
    }
    // division: c must divide r exactly, quotient >= 2
    var divisors = [];
    for (var i = 2; i <= 12; i++) {
      if (r % i === 0 && r / i >= 2) divisors.push(i);
    }
    if (!divisors.length) return null;
    c = pick(divisors);
    return [c, r / c];
  }

  function genQuestion() {
    var L = LEVELS[level];
    var ops = activeOps();
    for (var t = 0; t < 300; t++) {
      var op1 = pick(ops);
      var pair = genPair(op1);
      if (!pair) continue;
      var a = pair[0], b = pair[1], r1 = pair[2];

      if (Math.random() < L.singleProb) {
        return { text: a + ' ' + op1 + ' ' + b, answer: r1 };
      }

      var op2 = pick(ops);
      var step = genSecond(r1, op2);
      if (!step) continue;
      var c = step[0], r2 = step[1];

      // Brackets when left-to-right order would break BODMAS
      var needBrackets = (op2 === '×' || op2 === '÷') && (op1 === '+' || op1 === '−');
      var text = needBrackets
        ? '(' + a + ' ' + op1 + ' ' + b + ') ' + op2 + ' ' + c
        : a + ' ' + op1 + ' ' + b + ' ' + op2 + ' ' + c;
      return { text: text, answer: r2 };
    }
    // Fallback (never expected): simple addition
    var x = randInt(2, LEVELS[level].addMax), y = randInt(2, LEVELS[level].addMax);
    return { text: x + ' + ' + y, answer: x + y };
  }

  function nextQuestion() {
    current = genQuestion();
    attempts = 0;
    locked = false;
    qnumEl.textContent = qnum;
    questionEl.textContent = current.text + ' = ?';
    answerEl.value = '';
    feedbackEl.textContent = '';
    feedbackEl.className = 'feedback';
    attemptsEl.textContent = '';
    answerEl.focus();
  }

  function check() {
    if (locked) return;
    var raw = answerEl.value.trim();
    if (raw === '' || isNaN(Number(raw))) {
      answerEl.classList.remove('shake');
      void answerEl.offsetWidth;
      answerEl.classList.add('shake');
      return;
    }
    var val = Number(raw);
    if (val === current.answer) {
      locked = true;
      score++;
      if (attempts === 0) {
        streak++;
        popEl(streakEl);
      }
      scoreEl.textContent = score;
      streakEl.textContent = streak;

      // update persistent best streak
      var newBestStreak = false;
      if (streak > bestStreak) {
        newBestStreak = bestStreak >= 1;   // only celebrate beating a genuine prior record
        bestStreak = streak;
        saveBest(BEST_STREAK_KEY, bestStreak);
        bestStreakEl.textContent = bestStreak;
        popEl(bestStreakEl);
      }

      var msg = pick(praise) + (attempts === 0 ? ' First try!' : '');
      if (newBestStreak) msg += ' 🏆 New best!';
      feedbackEl.textContent = msg;
      feedbackEl.className = 'feedback correct';
      card.classList.remove('flash-green');
      void card.offsetWidth;
      card.classList.add('flash-green');
      var monty = attempts === 0 && streak > 0 && streak % 10 === 0;
      celebrate();
      if (monty) montyParty(streak);
      else if (newBestStreak) pandaDance();
      qnum++;
      setTimeout(nextQuestion, monty ? 3400 : (newBestStreak ? 2600 : 1200));
    } else {
      attempts++;
      if (attempts === 1) {
        streak = 0;
        streakEl.textContent = streak;
      }
      feedbackEl.textContent = pick(nudge);
      feedbackEl.className = 'feedback wrong';
      sadMoment();
      attemptsEl.textContent = 'Attempts: ' + attempts;
      answerEl.classList.remove('shake');
      void answerEl.offsetWidth;
      answerEl.classList.add('shake');
      answerEl.select();
    }
  }

  startBtn.addEventListener('click', function () {
    startView.classList.add('hidden');
    quizView.classList.remove('hidden');
    var opsHint = document.getElementById('opsHint');
    if (opsHint) opsHint.classList.add('hidden');
    nextQuestion();
    fitToViewport();
  });

  checkBtn.addEventListener('click', check);
  answerEl.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') check();
  });

  // --- keep everything on screen when the mobile keyboard opens ---
  var appWrap = document.getElementById('appWrap');

  function fitToViewport() {
    appWrap.style.zoom = 1;
    var avail = (window.visualViewport ? window.visualViewport.height : window.innerHeight) - 20;
    var need = appWrap.offsetHeight;
    var scale = Math.min(1, avail / need);
    appWrap.style.zoom = scale;
    if (scale < 1) window.scrollTo(0, 0);
  }

  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', fitToViewport);
  }
  window.addEventListener('resize', fitToViewport);
  answerEl.addEventListener('focus', function () { setTimeout(fitToViewport, 350); });
  answerEl.addEventListener('blur', function () { setTimeout(fitToViewport, 350); });
  fitToViewport();
})();
</script>
</body>
