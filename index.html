'%23d3b465' stroke-width='5'/%3E%3Ccircle cx='91.7' cy='118.3' r='5' fill='%23fff' opacity='0.5'/%3E%3Cpath d='M84.4 145.4q-7.4 27 7.4 41.8q17.2 14.7 36.9 9.8' fill='none' stroke='%23d3b465' stroke-width='3' stroke-linecap='round'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chango&family=Nunito:wght@800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    background: #89cff0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  #appWrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }
  .page-header { margin-bottom: 28px; }
  .card {
    background: #fff;
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    width: 100%;
    max-width: 480px;
    padding: 36px 32px;
    text-align: center;
  }
  .hidden { display: none !important; }

  /* ---------- Start screen ---------- */
  .logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 16px;
  }
  .logo-badge {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: #d0ecff;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .logo-badge svg { width: 96px; height: 108px; }
  .logo-word {
    font-family: 'Chango', 'Bree Serif', serif;
    font-size: 52px;
    line-height: 0.86;
    letter-spacing: -0.52px;
    text-align: left;
  }
  .logo-word .maths { color: #36884d; }
  .logo-word .quiz { color: #36884d; }
  .ops {
    display: flex;
    justify-content: center;
    gap: 10px;
  }
  .ops span {
    width: 34px;
    height: 34px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', system-ui, sans-serif;
    font-weight: 800;
    font-size: 20px;
    color: #fff;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transition: opacity 0.15s, transform 0.15s, filter 0.15s;
  }
  .ops .op-add { background: #0075d4; }
  .ops .op-sub { background: #07468b; }
  .ops .op-mul { background: #36884d; }
  .ops .op-div { background: #1b2435; }
  .ops span.off { opacity: 0.32; filter: saturate(0.35); transform: scale(0.9); }
  .ops-hint {
    font-family: 'Nunito', system-ui, sans-serif;
    font-weight: 800;
    font-size: 13px;
    color: #36884d;
    text-align: center;
    margin-top: 8px;
  }
  .levels {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 0 0 18px;
  }
  .level-btn {
    font-family: 'Chango', 'Bree Serif', serif;
    font-size: 18px;
    padding: 10px 20px;
    border-radius: 999px;
    border: 3px solid #d7e3f0;
    background: #fff;
    color: #36884d;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.1s;
  }
  .level-btn:hover { border-color: #89cff0; }
  .level-btn:active { transform: scale(0.96); }
  .level-btn.selected {
    background: #36884d;
    color: #fff;
    border-color: #36884d;
  }

  /* ---------- Let's Check ---------- */
  .blue-btn {
    font-family: 'Chango', 'Bree Serif', serif;
    font-size: 17px;
    background: #0075d4;
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 12px 20px 13px;
    cursor: pointer;
    box-shadow: #07468b 0 5px 0 0;
    transition: transform 0.1s, box-shadow 0.1s, background 0.2s;
  }
  .blue-btn:hover { background: #1a86e0; }
  .blue-btn:active { transform: translateY(4px); box-shadow: #07468b 0 1px 0 0; }
  .blue-btn.small { font-size: 14px; padding: 8px 16px 9px; box-shadow: #07468b 0 4px 0 0; }
  .quiz-foot { margin-top: 16px; }
  .check-title { font-family: 'Chango', 'Bree Serif', serif; font-size: 24px; color: #36884d; margin-bottom: 10px; }
  .check-note { color: #36884d; font-weight: 600; margin: 8px 0 14px; font-size: 15px; }
  .chart-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #36884d; font-weight: 800; text-align: left; margin: 12px 0 4px; }
  svg.chart { width: 100%; height: auto; display: block; }
  .tipbox { background: #d9f2d9; border-radius: 14px; padding: 12px 14px; text-align: left; color: #36884d; margin: 12px 0 0; }
  .tipbox h3 { font-family: 'Chango', 'Bree Serif', serif; font-size: 15px; margin-bottom: 6px; }
  .tipbox ul { margin-left: 18px; }
  .tipbox li { font-size: 13px; font-weight: 600; margin: 4px 0; }
  .fact-list { background: #eef5fc; border-radius: 14px; padding: 10px 14px; text-align: left; color: #36884d; margin: 10px 0 0; }
  .fact-list h3 { font-family: 'Chango', 'Bree Serif', serif; font-size: 14px; margin-bottom: 4px; color: #0075d4; }
  .fact-list div { font-size: 13px; font-weight: 700; margin: 3px 0; }
  .game-row { display: flex; flex-direction: column; gap: 8px; margin: 2px 0 14px; }
  .game-btn {
    font-family: 'Chango', 'Bree Serif', serif;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    background: #0075d4;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 11px 14px;
    cursor: pointer;
    text-align: left;
    box-shadow: #07468b 0 4px 0 0;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .game-btn:active { transform: translateY(3px); box-shadow: #07468b 0 1px 0 0; }
  .game-btn .pill {
    font-family: 'Nunito', system-ui, sans-serif;
    font-weight: 800;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    background: #d3b465;
    border-radius: 999px;
    padding: 3px 9px;
    flex-shrink: 0;
  }
  .check-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 6px; }
  .back-btn { font-family: 'Chango', 'Bree Serif', serif; font-size: 15px; background: #fff; color: #36884d; border: 3px solid #d7e3f0; border-radius: 14px; padding: 9px 18px; cursor: pointer; }
  .back-btn:hover { border-color: #89cff0; }
  .mini-progress { font-size: 12px; color: #36884d; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; min-height: 16px; }
  .mini-answers { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 4px 0 12px; }
  .mini-ans { font-family: 'Nunito', system-ui, sans-serif; font-weight: 800; font-size: 23px; padding: 13px 8px; border-radius: 14px; border: 3px solid #d7e3f0; background: #fff; color: #36884d; cursor: pointer; transition: background 0.12s, border-color 0.12s, transform 0.08s; }
  .mini-ans:active { transform: scale(0.96); }
  .mini-ans.right { background: #36884d; border-color: #36884d; color: #fff; }
  .mini-ans.wrongpick { background: #e3928b; border-color: #e3928b; color: #fff; }

  /* ---------- Daily Challenge, players, stickers ---------- */
  .gold-btn {
    font-family: 'Chango', 'Bree Serif', serif;
    font-size: 17px;
    background: #d3b465;
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 12px 20px 13px;
    cursor: pointer;
    box-shadow: #9c7f3c 0 5px 0 0;
    transition: transform 0.1s, box-shadow 0.1s, background 0.2s;
  }
  .gold-btn:hover { background: #ddc078; }
  .gold-btn:active { transform: translateY(4px); box-shadow: #9c7f3c 0 1px 0 0; }
  .btn-row { display: flex; gap: 10px; justify-content: center; margin-top: 12px; }
  .meta-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 14px; }
  .meta-btn {
    font-family: 'Nunito', system-ui, sans-serif;
    font-weight: 800;
    font-size: 12px;
    color: #36884d;
    background: #eef5fc;
    border: 2px solid #d7e3f0;
    border-radius: 999px;
    padding: 6px 14px;
    cursor: pointer;
  }
  .meta-btn:hover { border-color: #89cff0; }
  .duel-turn { font-family: 'Chango', 'Bree Serif', serif; font-size: 22px; min-height: 28px; }
  .duel-turn.p1 { color: #0075d4; }
  .duel-turn.p2 { color: #e3928b; }
  .start-btn {
    display: inline-flex;
    align-items: center;
    gap: 16px;
    background: #36884d;
    color: #fff;
    font-family: 'Chango', 'Bree Serif', serif;
    font-size: 30px;
    font-weight: 400;
    letter-spacing: 0.3px;
    border: none;
    border-radius: 20px;
    padding: 18px 34px 20px;
    cursor: pointer;
    box-shadow: #15632f 0 8px 0 0, rgba(21,99,47,0.7) 0 18px 26px -12px;
    margin: 10px 0 14px;
    transition: transform 0.1s, box-shadow 0.1s, background 0.2s;
  }
  .start-btn:hover { background: #3d9456; }
  .start-btn:active {
    transform: translateY(6px);
    box-shadow: #15632f 0 2px 0 0, rgba(21,99,47,0.7) 0 8px 14px -10px;
  }
  .start-btn .icon {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .start-btn .icon svg { width: 38px; height: 43px; }

  /* ---------- Quiz screen ---------- */
  .stats {
    display: flex;
    justify-content: space-between;
    margin-bottom: 12px;
    gap: 10px;
  }
  .stat {
    flex: 1;
    background: #d9f2d9;
    border-radius: 14px;
    padding: 10px 8px;
  }
  .stat .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #36884d;
    font-weight: 600;
  }
  .stat .value {
    font-size: 24px;
    font-weight: 800;
    color: #36884d;
  }
  .stat.streak .value { color: #36884d; }
  .bests {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 28px;
  }
  .bests .stat { background: #d9f2d9; flex: 0 1 200px; }
  .best-streak .value { color: #36884d; }
  .question {
    font-size: 42px;
    font-weight: 800;
    color: #36884d;
    margin: 18px 0 28px;
    letter-spacing: 1px;
    min-height: 56px;
  }
  .answer-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 20px;
  }
  input[type="text"] {
    width: 160px;
    font-size: 30px;
    font-weight: 700;
    text-align: center;
    padding: 12px;
    border: 3px solid #d6daf0;
    border-radius: 14px;
    outline: none;
    color: #36884d;
  }
  input[type="text"]:focus { border-color: #89cff0; }
  .check-btn {
    font-size: 18px;
    font-weight: 700;
    padding: 12px 26px;
    border: none;
    border-radius: 14px;
    background: #89cff0;
    color: #fff;
    cursor: pointer;
    transition: transform 0.1s, background 0.2s;
  }
  .check-btn:hover { background: #6db8e0; }
  .check-btn:active { transform: scale(0.96); }
  .feedback {
    min-height: 32px;
    font-size: 20px;
    font-weight: 700;
  }
  .feedback.correct { color: #36884d; }
  .feedback.wrong { color: #36884d; }
  .attempts {
    margin-top: 10px;
    font-size: 14px;
    color: #36884d;
  }
  .shake { animation: shake 0.4s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-10px); }
    40% { transform: translateX(10px); }
    60% { transform: translateX(-7px); }
    80% { transform: translateX(7px); }
  }
  .pop { animation: pop 0.45s; }
  @keyframes pop {
    0% { transform: scale(1); }
    40% { transform: scale(1.18); }
    100% { transform: scale(1); }
  }
  .card.flash-green { animation: flashGreen 0.7s; }
  @keyframes flashGreen {
    0% { box-shadow: 0 0 0 0 rgba(22,163,74,0.7); }
    100% { box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  }

  /* ---------- Celebrations ---------- */
  #confettiCanvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 60;
  }
  #pandaParty {
    position: fixed;
    inset: 0;
    z-index: 70;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    background: rgba(255,255,255,0.65);
    pointer-events: none;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.25s;
  }
  #pandaParty.show { opacity: 1; visibility: visible; }
  #pandaParty .dancer { animation: pandaDance 0.7s ease-in-out infinite; }
  #pandaParty .dancer svg { width: 200px; height: 225px; display: block; }
  #pandaParty .party-text {
    font-family: 'Chango', 'Bree Serif', serif;
    font-size: 36px;
    color: #36884d;
    text-shadow: 0 2px 0 #fff;
  }
  #pandaParty .spark {
    position: absolute;
    font-size: 34px;
    animation: sparkFloat 1.1s ease-in-out infinite;
  }
  @keyframes pandaDance {
    0%   { transform: rotate(0deg) translateY(0) scale(1); }
    15%  { transform: rotate(-12deg) translateY(-20px) scale(1.05); }
    30%  { transform: rotate(10deg) translateY(0) scale(1); }
    45%  { transform: rotate(-10deg) translateY(-16px) scale(1.07); }
    60%  { transform: rotate(12deg) translateY(0) scale(1); }
    75%  { transform: rotate(-8deg) translateY(-12px) scale(1.04); }
    100% { transform: rotate(0deg) translateY(0) scale(1); }
  }
  @keyframes sparkFloat {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-26px) rotate(14deg); }
  }
  #pandaSad {
    position: fixed;
    inset: 0;
    z-index: 65;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    pointer-events: none;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.2s;
  }
  #pandaSad.show { opacity: 1; visibility: visible; }
  #pandaSad.show .sad-panda { animation: sadDroop 1.3s ease-in-out; }
  #pandaSad .sad-panda svg {
    width: 130px;
    height: 146px;
    display: block;
    filter: grayscale(0.65);
  }
  #pandaSad .sad-text {
    font-family: 'Chango', 'Bree Serif', serif;
    font-size: 26px;
    color: #36884d;
    text-shadow: 0 2px 0 #fff;
  }
  @keyframes sadDroop {
    0%   { transform: translateY(-16px) rotate(0deg) scale(0.9); }
    25%  { transform: translateY(4px) rotate(-7deg) scale(1); }
    50%  { transform: translateY(8px) rotate(6deg) scale(1); }
    75%  { transform: translateY(12px) rotate(-4deg) scale(0.98); }
    100% { transform: translateY(14px) rotate(0deg) scale(0.97); }
  }

  /* ---------- Montgomery: every 10 in a row ---------- */
  #montyParty {
    position: fixed;
    inset: 0;
    z-index: 80;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: rgba(233, 241, 252, 0.92);
    pointer-events: none;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.25s;
  }
  #montyParty.show { opacity: 1; visibility: visible; }
  .m-stage {
    position: relative;
    width: 320px;
    height: 330px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  .m-stage::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 56%;
    width: 250px;
    height: 250px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle, #d0ecff 0%, #eef5fc 55%, transparent 72%);
  }
  .m-confetti, .m-pops {
    position: absolute;
    inset: -10px 0 0 0;
    pointer-events: none;
  }
  .m-confetti { overflow: hidden; border-radius: 24px; }
  .m-panda { position: relative; z-index: 2; }
  .m-honour {
    font-family: 'Chango', 'Bree Serif', serif;
    font-size: 30px;
    color: #0075d4;
    letter-spacing: 0.4px;
    text-shadow: 0 2px 0 #fff;
  }
  .m-points {
    font-family: 'Chango', 'Bree Serif', serif;
    font-size: 20px;
    color: #fff;
    background: #36884d;
    padding: 8px 18px;
    border-radius: 999px;
    margin-top: 8px;
  }
  #montyParty.show .m-honour, #montyParty.show .m-points { animation: popin 0.55s cubic-bezier(.2,1.4,.4,1) both; }
  @keyframes popin {
    0% { transform: scale(0.55); opacity: 1; }
    55% { transform: scale(1.12); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* the dance rig */
  .pd-svg { overflow: visible; }
  .pd-dancer { transform-box: fill-box; transform-origin: center bottom; animation: pd-groove 0.92s ease-in-out infinite; }
  .pd-head { transform-box: fill-box; transform-origin: center bottom; animation: pd-headbob 0.92s ease-in-out infinite; }
  .pd-arm  { transform-box: fill-box; transform-origin: center top; }
  .pd-arm-l { animation: pd-armL 0.46s ease-in-out infinite; }
  .pd-arm-r { animation: pd-armR 0.46s ease-in-out infinite; }
  .pd-leg  { transform-box: fill-box; transform-origin: center top; }
  .pd-leg-l { animation: pd-legL 0.92s ease-in-out infinite; }
  .pd-leg-r { animation: pd-legR 0.92s ease-in-out infinite; }
  .pd-cane { transform-box: fill-box; transform-origin: center bottom; animation: pd-cane 0.92s ease-in-out infinite; }
  .pd-shadow { transform-box: fill-box; transform-origin: center center; animation: pd-shadow 0.92s ease-in-out infinite; }

  @keyframes pd-groove {
    0%   { transform: translateY(2px)  rotate(-3deg) scaleY(0.97); }
    25%  { transform: translateY(-18px) rotate(0deg)  scaleY(1.03); }
    50%  { transform: translateY(2px)  rotate(3deg)  scaleY(0.97); }
    75%  { transform: translateY(-18px) rotate(0deg)  scaleY(1.03); }
    100% { transform: translateY(2px)  rotate(-3deg) scaleY(0.97); }
  }
  @keyframes pd-headbob {
    0% { transform: rotate(5deg); } 50% { transform: rotate(-5deg); } 100% { transform: rotate(5deg); }
  }
  @keyframes pd-armL {
    0% { transform: rotate(122deg); } 50% { transform: rotate(150deg); } 100% { transform: rotate(122deg); }
  }
  @keyframes pd-armR {
    0% { transform: rotate(-122deg); } 50% { transform: rotate(-150deg); } 100% { transform: rotate(-122deg); }
  }
  @keyframes pd-legL {
    0%,100% { transform: rotate(0deg); } 25% { transform: rotate(12deg); } 50% { transform: rotate(0deg); }
  }
  @keyframes pd-legR {
    0%,100% { transform: rotate(0deg); } 75% { transform: rotate(-12deg); } 50% { transform: rotate(0deg); }
  }
  @keyframes pd-cane {
    0% { transform: rotate(-6deg); } 50% { transform: rotate(8deg); } 100% { transform: rotate(-6deg); }
  }
  @keyframes pd-shadow {
    0%,50%,100% { transform: scaleX(1); opacity: 0.16; }
    25%,75%     { transform: scaleX(0.7); opacity: 0.09; }
  }

  /* falling confetti pieces */
  .cfetti {
    position: absolute;
    top: -24px;
    width: 11px;
    height: 14px;
    border-radius: 2px;
    animation: cfall linear forwards;
  }
  @keyframes cfall {
    0%   { transform: translateY(0) translateX(0) rotate(0deg); opacity: 1; }
    85%  { opacity: 1; }
    100% { transform: translateY(330px) translateX(var(--dx)) rotate(var(--rot)); opacity: 0; }
  }

  /* maths-symbol pops */
  .m-pop {
    position: absolute;
    left: 50%;
    top: 46%;
    font-family: 'Chango', 'Bree Serif', serif;
    font-weight: 700;
    transform: translate(-50%,-50%) scale(0);
    animation: mpop 0.7s cubic-bezier(.2,1.3,.5,1) forwards;
  }
  @keyframes mpop {
    0%   { transform: translate(-50%,-50%) translate(0,0) scale(0); opacity: 0; }
    35%  { opacity: 1; }
    100% { transform: translate(-50%,-50%) translate(var(--px), var(--py)) scale(1); opacity: 0; }
  }

  @media (prefers-reduced-motion: reduce) {
    .pd-dancer,.pd-head,.pd-arm-l,.pd-arm-r,.pd-leg-l,.pd-leg-r,.pd-cane,.pd-shadow,.cfetti,.m-pop { animation: none; }
    .pd-arm-l { transform: rotate(135deg); } .pd-arm-r { transform: rotate(-135deg); }
  }

  /* ---------- Compact layout for phones ---------- */
  @media (max-width: 480px) {
    body { padding: 10px; }
    .page-header { margin-bottom: 14px; }
    .logo { gap: 12px; margin-bottom: 10px; }
    .logo-badge { width: 72px; height: 72px; }

    .levels { gap: 8px; margin-bottom: 12px; }

    .stats { margin-bottom: 8px; gap: 8px; }

</style>

(function () {
  var qnumEl = document.getElementById('qnum');
  var scoreEl = document.getElementById('score');
  var streakEl = document.getElementById('streak');
  var questionEl = document.getElementById('question');
  var answerEl = document.getElementById('answer');
  var checkBtn = document.getElementById('check');
  var feedbackEl = document.getElementById('feedback');
  var attemptsEl = document.getElementById('attempts');

  var bestStreakEl = document.getElementById('bestStreak');
  var startView = document.getElementById('startView');
  var quizView = document.getElementById('quizView');
  var startBtn = document.getElementById('startBtn');

  var qnum = 1, score = 0, streak = 0, attempts = 0;
  var current = null;
  var locked = false;
  var qStart = 0;   // when the current question appeared (for speed tracking)

  // --- persistent best streak (saved in this browser) ---
  var BEST_STREAK_KEY = 'mathsQuizBestStreak';

  function loadBest(key) {
    try {
      var v = parseInt(localStorage.getItem(key), 10);
      return isNaN(v) ? 0 : v;
    } catch (e) { return 0; }   // private mode / storage blocked: just don't persist
  }
  function saveBest(key, val) {
    try { localStorage.setItem(key, String(val)); } catch (e) {}
  }

  // --- player profiles: every saved value below is namespaced per player ---
  var PLAYERS_KEY = 'mathsQuizPlayers';
  var CUR_PLAYER_KEY = 'mathsQuizCurrentPlayer';
  var players = loadJSON(PLAYERS_KEY, []);
  var player = loadJSON(CUR_PLAYER_KEY, null);
  if (!players.length) {
    players = ['Player 1'];
    saveJSON(PLAYERS_KEY, players);
  }

  }
  function drumHat(at, open) {
    var src = actx.createBufferSource(), g = actx.createGain(), hp = actx.createBiquadFilter();
    src.buffer = mkNoise();
    hp.type = 'highpass';
    hp.frequency.value = 6500;
    g.gain.setValueAtTime(open ? 0.02 : 0.012, at);
    g.gain.exponentialRampToValueAtTime(0.0001, at + (open ? 0.16 : 0.035));
    src.connect(hp);
    hp.connect(g);
    g.connect(musicGain);
    src.start(at);
    src.stop(at + (open ? 0.18 : 0.05));
  }
  function pluck(freq, at, dur, vol) {   // bass-guitar pluck
    var o = actx.createOscillator(), g = actx.createGain(), lp = actx.createBiquadFilter();
    o.type = 'triangle';
    o.frequency.value = freq;
    lp.type = 'lowpass';
    lp.frequency.value = 700;
    g.gain.setValueAtTime(0.0001, at);
    g.gain.linearRampToValueAtTime(vol, at + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, at + dur);
    o.connect(lp);
    lp.connect(g);
    g.connect(musicGain);
    o.start(at);
    o.stop(at + dur + 0.05);
  }
  function leadNote(freq, at, dur) {   // soft guitar-style lead
    var o = actx.createOscillator(), g = actx.createGain(), lp = actx.createBiquadFilter();
    o.type = 'sawtooth';
    o.frequency.value = freq;
    lp.type = 'lowpass';
    lp.frequency.value = 1400;
    lp.Q.value = 0.7;
    g.gain.setValueAtTime(0.0001, at);
    g.gain.linearRampToValueAtTime(0.045, at + 0.03);
    g.gain.setValueAtTime(0.045, at + Math.max(0.04, dur - 0.12));
    g.gain.exponentialRampToValueAtTime(0.0001, at + dur);
    o.connect(lp);
    lp.connect(g);
    g.connect(musicGain);
    o.start(at);
    o.stop(at + dur + 0.05);
  }
  function padChord(notes, at, vol) {   // warm sustained chord
    for (var i = 0; i < notes.length; i++) {
      var o = actx.createOscillator(), g = actx.createGain();
      o.type = 'sine';
      o.frequency.value = notes[i] * (i % 2 ? 1.003 : 0.997);
      g.gain.setValueAtTime(0.0001, at);
      g.gain.linearRampToValueAtTime(vol, at + 0.18);
      g.gain.exponentialRampToValueAtTime(0.0001, at + 1.7);
      o.connect(g);
      g.connect(musicGain);
      o.start(at);
      o.stop(at + 1.8);
    }
  }
  function scheduleStep(step, at) {
    var s = step % LOOPLEN;
    var b = s % 16;
    var chord = PROG[Math.floor(s / 32)];
    if (b === 0 || b === 7 || b === 10) drumKick(at);
    if (b === 4 || b === 12) drumSnare(at);
    if (s % 2 === 0 && b !== 0 && b !== 4 && b !== 12) drumHat(at, b === 14);
    for (var i = 0; i < BASS_PAT.length; i++) {
      if (BASS_PAT[i][0] === b) pluck(chord.root * BASS_PAT[i][1], at, BASS_PAT[i][2] * MTEMPO + 0.1, 0.15);
    }
    if (s % 32 === 0) padChord(chord.pad, at, 0.022);
    else if (s % 32 === 16) padChord(chord.pad, at, 0.012);
    var L = LEAD_AT[s];
    if (L) leadNote(L[0], at, L[1] * MTEMPO + 0.12);
  }
  function musicLoop() {
    while (nextNoteTime < actx.currentTime + 0.25) {
      scheduleStep(musicStep, nextNoteTime);
      musicStep++;
      nextNoteTime += MTEMPO * (musicStep % 2 === 1 ? 1.12 : 0.88);   // light swing
    }
  }
  function startMusic() {
    if (!musicOn || musicTimer || !ensureAudio()) return;
    if (!musicGain) {
      musicGain = actx.createGain();
      musicGain.connect(actx.destination);
    }
    musicGain.gain.cancelScheduledValues(actx.currentTime);
    musicGain.gain.setValueAtTime(0.0001, actx.currentTime);
    musicGain.gain.linearRampToValueAtTime(0.5 * volMult(), actx.currentTime + 1.5);
    musicStep = 0;
    nextNoteTime = actx.currentTime + 0.1;
    musicTimer = setInterval(musicLoop, 100);
  }
  function stopMusic() {
    if (musicTimer) {
      clearInterval(musicTimer);
      musicTimer = null;
    }
    if (musicGain && actx) {
      musicGain.gain.cancelScheduledValues(actx.currentTime);
      musicGain.gain.setValueAtTime(Math.max(musicGain.gain.value, 0.0001), actx.currentTime);
      musicGain.gain.linearRampToValueAtTime(0.0001, actx.currentTime + 0.4);
    }
  }
  // browsers only allow audio after the first tap or key press
  document.addEventListener('pointerdown', function () { startMusic(); }, { once: true });
  document.addEventListener('keydown', function () { startMusic(); }, { once: true });

  // ===================== Who's playing =====================
  var playersView = document.getElementById('playersView');
  var playerBtn = document.getElementById('playerBtn');
  var soundBtn = document.getElementById('soundBtn');
  var musicBtn = document.getElementById('musicBtn');
  var volBtn = document.getElementById('volBtn');
  function refreshMeta() {
    playerBtn.textContent = 'Playing: ' + player;
    soundBtn.textContent = soundOn ? 'Sound: On' : 'Sound: Off';
    musicBtn.textContent = musicOn ? 'Music: On' : 'Music: Off';
    volBtn.textContent = 'Volume: ' + volLevel.charAt(0).toUpperCase() + volLevel.slice(1);
  }
  refreshMeta();
  soundBtn.addEventListener('click', function () {
    soundOn = !soundOn;
    saveJSON(SOUND_KEY, soundOn);
    refreshMeta();
    sfx('right');
  });
  musicBtn.addEventListener('click', function () {
    musicOn = !musicOn;
    saveJSON(MUSIC_KEY, musicOn);
    refreshMeta();
    if (musicOn) startMusic();
    else stopMusic();
  });
  volBtn.addEventListener('click', function () {
    volLevel = volLevel === 'high' ? 'medium' : (volLevel === 'medium' ? 'low' : 'high');
    saveJSON(VOL_KEY, volLevel);
    refreshMeta();
    if (musicTimer && musicGain && actx) {
      musicGain.gain.cancelScheduledValues(actx.currentTime);
      musicGain.gain.setValueAtTime(Math.max(musicGain.gain.value, 0.0001), actx.currentTime);
      musicGain.gain.linearRampToValueAtTime(0.5 * volMult(), actx.currentTime + 0.3);
    }
    sfx('right');
  });
  function renderPlayers() {
    var list = document.getElementById('playerList');
    list.innerHTML = '';
    players.forEach(function (name) {
      var b = document.createElement('button');
      b.type = 'button';
      b.className = 'game-btn';
      var s = document.createElement('span');
      s.textContent = name;
      b.appendChild(s);
      if (name === player) {
        var pill = document.createElement('span');
        pill.className = 'pill';
        pill.textContent = 'You';
        b.appendChild(pill);
      }
      b.addEventListener('click', function () {
        saveJSON(CUR_PLAYER_KEY, name);
        location.reload();
      });
      list.appendChild(b);
    });
  }
  playerBtn.addEventListener('click', function () { renderPlayers(); showView(playersView); });
  document.getElementById('playersBack').addEventListener('click', function () { showView(startView); });
  document.getElementById('addPlayerBtn').addEventListener('click', function () {
    var inp = document.getElementById('newPlayerName');
    var name = inp.value.trim().slice(0, 14);
    if (!name || players.indexOf(name) >= 0) {
      inp.classList.remove('shake');
      void inp.offsetWidth;
      inp.classList.add('shake');
      return;
    }
    players.push(name);
    saveJSON(PLAYERS_KEY, players);
    saveJSON(CUR_PLAYER_KEY, name);
    location.reload();
  });

  // ===================== Monty's Daily Challenge =====================
  // Seeded by the date: every player in the world gets the SAME 10 questions today.
  var DAILY_KEY = 'mathsQuizDaily';
  var dailyView = document.getElementById('dailyView');
  var dailyProgress = document.getElementById('dailyProgress');
  var dailyQuestionEl = document.getElementById('dailyQuestion');
  var dailyInput = document.getElementById('dailyInput');
  var dailyRow = document.getElementById('dailyRow');
  var dailyFeedback = document.getElementById('dailyFeedback');
  var daily = { qs: [], idx: 0, score: 0, active: false, waiting: false };

  function seededRng(str) {
    var h = 1779033703 ^ str.length;
    for (var i = 0; i < str.length; i++) {
      h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
      h = (h << 13) | (h >>> 19);
    }
    return function () {
      h = Math.imul(h ^ (h >>> 16), 2246822507);
      h = Math.imul(h ^ (h >>> 13), 3266489909);
      h ^= h >>> 16;
      return (h >>> 0) / 4294967296;
    };
  }
  function dailyQuestions() {
    var saveRng = rng, saveLevel = level, saveOps = enabledOps;
    rng = seededRng('monty-' + todayKey());
    level = 'medium';
    enabledOps = { '+': true, '−': true, '×': true, '÷': true };
    var qs = [], seen = {}, guard = 0;
    while (qs.length < 10 && guard++ < 500) {
      var q = genQuestion();
      if (!seen[q.text]) { seen[q.text] = 1; qs.push(q); }
    }
    rng = saveRng; level = saveLevel; enabledOps = saveOps;
    return qs;
  }
  function openDaily() {
    var rec = loadJSON(pfx(DAILY_KEY), null);
    showView(dailyView);
    if (rec && rec.date === todayKey()) {
      daily.active = false;
      dailyRow.classList.add('hidden');
      dailyProgress.textContent = 'Done for today!';
      dailyQuestionEl.textContent = rec.score + ' / 10';
      dailyFeedback.textContent = 'Come back tomorrow for 10 new questions!';
      return;
    }
    daily.qs = dailyQuestions();
    daily.idx = 0; daily.score = 0; daily.active = true; daily.waiting = false;
    dailyRow.classList.remove('hidden');
    nextDaily();
  }
  function nextDaily() {
    daily.waiting = false;
    if (daily.idx >= 10) { endDaily(); return; }
    dailyProgress.textContent = 'Question ' + (daily.idx + 1) + ' of 10 · Score ' + daily.score;
    dailyQuestionEl.textContent = daily.qs[daily.idx].text + ' = ?';
    dailyInput.value = '';
    dailyFeedback.textContent = '';
    dailyInput.focus();
    qStart = Date.now();
    fitToViewport();
  }
  function dailyAnswer() {
    if (!daily.active || daily.waiting) return;
    var raw = dailyInput.value.trim();
    if (raw === '' || isNaN(Number(raw))) return;
    var q = daily.qs[daily.idx];
    var elapsed = Date.now() - qStart;
    var right = Number(raw) === q.answer;
    recordResult(q.ops, right, elapsed);
    recordFact(q.text, q.answer, right, elapsed);
    daily.waiting = true;
    if (right) {
      daily.score++;
      sfx('right');
      celebrate();
      dailyFeedback.textContent = pick(praise);
    } else {
      sfx('wrong');
      dailyFeedback.textContent = 'It was ' + q.answer + '!';
    }
    daily.idx++;
    setTimeout(nextDaily, right ? 800 : 1400);
  }
  function endDaily() {
    daily.active = false;
    var rec = loadJSON(pfx(DAILY_KEY), null);
    var dBest = Math.max(daily.score, rec && rec.best ? rec.best : 0);
    saveJSON(pfx(DAILY_KEY), { date: todayKey(), score: daily.score, best: dBest });
    dailyRow.classList.add('hidden');
    dailyProgress.textContent = 'All done!';
    dailyQuestionEl.textContent = daily.score + ' / 10';
    dailyFeedback.textContent = (daily.score >= 8 ? 'Brilliant! ' : '') + 'Everyone gets the same 10 questions today — compare with your friends!';
    if (daily.score >= 8) { sfx('fanfare'); pandaDance(); } else { sfx('end'); }
  }
  document.getElementById('dailyBtn').addEventListener('click', openDaily);
  document.getElementById('dailyGo').addEventListener('click', dailyAnswer);
  dailyInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') dailyAnswer(); });
  dailyInput.addEventListener('focus', function () { setTimeout(fitToViewport, 350); });
  document.getElementById('dailyBack').addEventListener('click', function () { showView(startView); });

  // ===================== 2-Player Duel: pass the phone! =====================
  var duelView = document.getElementById('duelView');
  var duelProgress = document.getElementById('duelProgress');
  var duelTurn = document.getElementById('duelTurn');
  var duelQuestionEl = document.getElementById('duelQuestion');
  var duelInput = document.getElementById('duelInput');
  var duelRow = document.getElementById('duelRow');
  var duelFeedback = document.getElementById('duelFeedback');
  var duelAgainBtn = document.getElementById('duelAgain');
  var DUEL_NAMES = ['Blue Panda', 'Red Panda'];
  var duel = { round: 0, total: 10, scores: [0, 0], turn: 0, answer: 0, active: false, waiting: false };

  function startDuel() {
    duel.round = 0; duel.scores = [0, 0]; duel.active = true; duel.waiting = false;
    duelAgainBtn.classList.add('hidden');
    duelRow.classList.remove('hidden');
    duelFeedback.textContent = '';
    showView(duelView);
    nextDuel();
  }
  function nextDuel() {
    duel.waiting = false;
    if (duel.round >= duel.total) { endDuel(); return; }
    duel.turn = duel.round % 2;
    var q = genQuestion();
    duel.answer = q.answer;
    duelProgress.textContent = 'Blue ' + duel.scores[0] + ' — ' + duel.scores[1] + ' Red · Question ' + (duel.round + 1) + ' of ' + duel.total;
    duelTurn.textContent = DUEL_NAMES[duel.turn] + ', your turn — pass the screen!';
    duelTurn.className = 'duel-turn ' + (duel.turn ? 'p2' : 'p1');
    duelQuestionEl.textContent = q.text + ' = ?';
    duelInput.value = '';
    duelFeedback.textContent = '';
    duelInput.focus();
    fitToViewport();
  }
  function duelAnswer() {
    if (!duel.active || duel.waiting) return;
    var raw = duelInput.value.trim();
    if (raw === '' || isNaN(Number(raw))) return;
    duel.waiting = true;
    var right = Number(raw) === duel.answer;
    if (right) {
      duel.scores[duel.turn]++;
      sfx('right');
      celebrate();
      duelFeedback.textContent = pick(praise) + ' Point to ' + DUEL_NAMES[duel.turn] + '!';
    } else {
      sfx('wrong');
      duelFeedback.textContent = 'It was ' + duel.answer + '!';
    }
    duel.round++;
    setTimeout(nextDuel, right ? 900 : 1400);
  }
  function endDuel() {
    duel.active = false;
    duelRow.classList.add('hidden');
    duelTurn.textContent = '';
    duelTurn.className = 'duel-turn';
    duelProgress.textContent = 'Final score';
    duelQuestionEl.textContent = duel.scores[0] + ' — ' + duel.scores[1];
    if (duel.scores[0] === duel.scores[1]) {
      duelFeedback.textContent = 'It’s a draw — rematch?';
      sfx('end');
    } else {
      var w = duel.scores[0] > duel.scores[1] ? 0 : 1;
      duelFeedback.textContent = DUEL_NAMES[w] + ' wins! Monty is dancing!';
      sfx('fanfare');
      pandaDance();
    }
    duelAgainBtn.classList.remove('hidden');
    fitToViewport();
  }
  document.getElementById('duelBtn').addEventListener('click', startDuel);
  document.getElementById('duelGo').addEventListener('click', duelAnswer);
  duelInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') duelAnswer(); });
  duelInput.addEventListener('focus', function () { setTimeout(fitToViewport, 350); });
  duelAgainBtn.addEventListener('click', startDuel);
  document.getElementById('duelBack').addEventListener('click', function () {
    duel.active = false;
    showView(startView);
  });

  // --- keep everything on screen when the mobile keyboard opens ---
  var appWrap = document.getElementById('appWrap');

  function fitToViewport() {
    appWrap.style.zoom = 1;
    var avail = (window.visualViewport ? window.visualViewport.height : window.innerHeight) - 20;
    var need = appWrap.offsetHeight;
    var scale = Math.min(1, avail / need);
    appWrap.style.zoom = scale;
    if (scale < 1) window.scrollTo(0, 0);
  }

  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', fitToViewport);
  }
  window.addEventListener('resize', fitToViewport);
  answerEl.addEventListener('focus', function () { setTimeout(fitToViewport, 350); });
  answerEl.addEventListener('blur', function () { setTimeout(fitToViewport, 350); });
  fitToViewport();
})();
</script>
